# Nuoto application stack — backend API + React frontend behind Traefik
#
# Services and ports:
#   traefik    :80 (redirect → HTTPS), :443 (HTTPS, Let's Encrypt)
#   frontend   internal only — nginx serves the React SPA, proxies /api to backend
#   backend    internal only (Go REST API — reached via frontend nginx proxy)
#   redis               6379           (athlete data store)
#
# Before first start set your e-mail for Let's Encrypt notifications:
#   export ACME_EMAIL=you@example.com
#
# Start:
#   docker compose -f compose.nuoto.yml up

services:

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: >
      redis-server
        --save 3600 1
        --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    # Reachable internally via the nginx proxy in the frontend container
    expose:
      - "8090"
    environment:
      REDIS_ADDR: redis:6379
      AGGREGATED_DIR: /data/aggregated
      PORT: "8090"
    volumes:
      # aggregated is mounted read-only so the backend can fall back to disk
      # while competition results are still being loaded into Redis.
      - ./aggregated:/data/aggregated:ro
    depends_on:
      redis:
        condition: service_healthy
    # The backend loads the full index on startup before serving traffic.
    # Give it ample time before health checks start.
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 180s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    # No direct port exposure — traffic arrives through Traefik
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      # Route all HTTPS traffic for the hostname to this service
      - "traefik.http.routers.frontend.rule=Host(`mastrogiovanni.ddns.net`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

  traefik:
    image: traefik:v3.3
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Docker socket so Traefik can read container labels (read-only)
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Persistent storage for Let's Encrypt certificates
      - traefik-certs:/letsencrypt
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      # Entrypoint: plain HTTP — only used for the ACME HTTP-01 challenge
      # and to redirect everything else to HTTPS
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.web.http.redirections.entrypoint.permanent=true
      # Entrypoint: HTTPS
      - --entrypoints.websecure.address=:443
      # Let's Encrypt ACME via HTTP-01 challenge
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:?Set ACME_EMAIL to your e-mail address}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json

volumes:
  redis-data:
  traefik-certs:
