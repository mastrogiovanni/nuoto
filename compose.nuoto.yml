# Nuoto application stack — backend API + React frontend
#
# Services and ports:
#   frontend   http://localhost:5173   (nginx — serves the React SPA, proxies /api to backend)
#   backend    http://localhost:8090   (Go REST API)
#   redis               6379           (athlete data store)
#
# Start:
#   docker compose -f compose.nuoto.yml up

services:

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: >
      redis-server
        --save 3600 1
        --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      REDIS_ADDR: redis:6379
      AGGREGATED_DIR: /data/aggregated
      PORT: "8090"
    volumes:
      # aggregated is mounted read-only so the backend can fall back to disk
      # while competition results are still being loaded into Redis.
      - ./aggregated:/data/aggregated:ro
    depends_on:
      redis:
        condition: service_healthy
    # The backend loads the full index on startup before serving traffic.
    # Give it ample time before health checks start.
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 180s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  redis-data:
