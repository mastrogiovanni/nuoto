global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # Traefik exposes Prometheus metrics on its internal :8082/metrics endpoint.
  # Labels added here make it easy to filter/group in Grafana dashboards.
  - job_name: traefik
    static_configs:
      - targets:
          - traefik:8082
        labels:
          service: traefik
          environment: production
